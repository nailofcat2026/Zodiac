<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>12星座探しゲーム</title>
  <style>
    /* ===============================
       基本レイアウト（1.5倍拡大）
       =============================== */
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f7f7ff;
      font-size: 24px;
    }

    h1 {
      margin-top: 20px;
      font-size: 36px;
    }

    h3 {
      font-size: 27px;
      margin-top: 25px;
    }

    /* ===============================
       ボタン
       =============================== */
    #controls {
      margin: 15px;
    }

    button {
      margin: 0 8px;
      padding: 12px 24px;
      font-size: 21px;
      border-radius: 8px;
      cursor: pointer;
    }

    #restartBtn {
      margin-top: 10px;
    }

    /* ===============================
       情報表示
       =============================== */
    #info {
      margin: 15px;
      font-size: 33px;
      font-weight: bold;
      color: #d40000;
      line-height: 1.4;
    }

    #info span {
      font-size: 39px;
      color: #d40000;
      font-weight: bold;
    }

    /* ===============================
       タイル（1.5倍）
       =============================== */
    .board {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px auto;
      max-width: 900px;
    }

    .tile {
      width: 120px;
      height: 120px;
      margin: 8px;
      border-radius: 12px;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #ffffff;
      transition: background 0.2s, opacity 0.3s;
      user-select: none;
      overflow: hidden;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.2s;
    }

    .hidden img {
      opacity: 0;
    }

    .correct {
      background: #c8f7c5;
    }

    .wrong {
      background: #f7c5c5;
    }

    #top-row .tile {
      cursor: default;
    }

    /* ゲームオーバー時の赤い半透明 */
    .gameover-dim-red {
      opacity: 0.4;
      background: rgba(255, 80, 80, 0.4);
      pointer-events: none;
    }

    /* 点滅アニメーション */
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }
    .blinking {
      animation: blink 1s infinite;
    }

    /* ===============================
       スマホ最適化
       =============================== */
    @media (max-width: 600px) {
      body { font-size: 18px; }
      h1 { font-size: 28px; }
      h3 { font-size: 22px; }
      button { font-size: 18px; padding: 10px 18px; }
      #info { font-size: 26px; }
      #info span { font-size: 30px; }
      .tile { width: 90px; height: 90px; margin: 6px; }
      .board { max-width: 100%; padding: 0 10px; }
    }
  </style>
</head>
<body>
  <h1>12星座探しゲーム</h1>

  <div id="controls">
    <button id="startNormal">はじめる</button>
    <button id="startHard">難しくする</button>
  </div>

  <button id="restartBtn" style="display:none;">もう一度遊ぶ</button>

  <div id="info">
    <div>モード：<span id="modeLabel">未開始</span></div>
    <div>タイム：<span id="timeLabel">0.000</span> 秒</div>
    <div>状態：<span id="statusLabel">ボタンを押して開始</span></div>
  </div>

  <h3>探してほしい星座</h3>
  <div id="top-row" class="board"></div>

  <h3>下の絵柄を急いで押していってください</h3>
  <div id="bottom-row" class="board"></div>

  <script>
    const ALL_SYMBOLS = [
      "01.png","02.png","03.png","04.png","05.png","06.png",
      "07.png","08.png","09.png","10.png","11.png","12.png"
    ];

    const topRow = document.getElementById("top-row");
    const bottomRow = document.getElementById("bottom-row");
    const startNormalBtn = document.getElementById("startNormal");
    const startHardBtn = document.getElementById("startHard");
    const restartBtn = document.getElementById("restartBtn");
    const modeLabel = document.getElementById("modeLabel");
    const timeLabel = document.getElementById("timeLabel");
    const statusLabel = document.getElementById("statusLabel");

    let gameState = {
      mode: "normal",
      answerSymbols: [],
      bottomTiles: [],
      started: false,
      firstClickDone: false,
      correctCount: 0,
      timerStart: 0,
      timerId: null,
      locked: false,
      hardVisible: false
    };

    function shuffle(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function startGame(mode) {
      resetGame();
      gameState.mode = mode;
      modeLabel.textContent = mode === "normal" ? "ふつう" : "むずかしい";

      const shuffled = shuffle(ALL_SYMBOLS);
      gameState.answerSymbols = shuffled.slice(0, 6);

      const dummies = shuffled.slice(6, 12);
      gameState.bottomTiles = shuffle(gameState.answerSymbols.concat(dummies));

      renderTopRow();
      renderBottomRow();

      statusLabel.textContent = "下の12個の絵柄をクリックしてね（1つ目で計測開始）";
      gameState.started = true;
    }

    function resetGame() {
      gameState.started = false;
      gameState.firstClickDone = false;
      gameState.correctCount = 0;
      gameState.timerStart = 0;
      gameState.locked = false;
      gameState.hardVisible = false;

      if (gameState.timerId) {
        clearInterval(gameState.timerId);
        gameState.timerId = null;
      }

      timeLabel.textContent = "0.000";
      statusLabel.textContent = "ボタンを押して開始";
      topRow.innerHTML = "";
      bottomRow.innerHTML = "";

      restartBtn.style.display = "none";
      restartBtn.classList.remove("blinking");
    }

    /* ===============================
       上段の表示（モード別）
       =============================== */
    function renderTopRow() {
      topRow.innerHTML = "";

      gameState.answerSymbols.forEach((sym, i) => {
        const div = document.createElement("div");

        if (gameState.mode === "normal") {
          // ★ 普通モード：6つ全部表示
          div.className = "tile";
        } else {
          // ★ 難しいモード：最初は1つだけ表示
          div.className = i === 0 ? "tile" : "tile hidden";
        }

        const img = document.createElement("img");
        img.src = sym;
        div.appendChild(img);

        topRow.appendChild(div);
      });
    }

    function renderBottomRow() {
      bottomRow.innerHTML = "";
      gameState.bottomTiles.forEach((sym, index) => {
        const div = document.createElement("div");
        div.className = "tile";

        const img = document.createElement("img");
        img.src = sym;
        div.appendChild(img);

        div.dataset.index = index;
        div.addEventListener("click", onBottomTileClick);

        bottomRow.appendChild(div);
      });
    }

    function onBottomTileClick(e) {
      if (!gameState.started || gameState.locked) return;

      const tileDiv = e.currentTarget;
      const index = parseInt(tileDiv.dataset.index, 10);
      const symbol = gameState.bottomTiles[index];

      if (!gameState.firstClickDone) {
        gameState.firstClickDone = true;
        gameState.timerStart = performance.now();
        gameState.timerId = setInterval(updateTimer, 20);
      }

      if (gameState.answerSymbols.includes(symbol)) {
        tileDiv.classList.add("correct");
        gameState.correctCount++;

        // ★ 難しいモードのみ：上段を1つずつ開示
        if (gameState.mode === "hard") {
          revealNextTopTile();
        }

        // ★ toggleTiles は上段開示が終わってから（= 正解6個後）
        if (gameState.mode === "hard" && gameState.correctCount > 6) {
          toggleTiles();
        }

        if (gameState.correctCount >= 6) {
          finishGame(true);
        }
      } else {
        tileDiv.classList.add("wrong");
        finishGame(false);
      }
    }

    /* 上段の次の1つを表示（ハード専用） */
    function revealNextTopTile() {
      const tiles = document.querySelectorAll("#top-row .tile");
      if (gameState.correctCount < tiles.length) {
        tiles[gameState.correctCount].classList.remove("hidden");
      }
    }

    /* ▼▼▼ ハードモード：下段だけ隠す ▼▼▼ */
    function toggleTiles() {
      gameState.hardVisible = !gameState.hardVisible;

      document.querySelectorAll("#bottom-row .tile").forEach(tile => {
        tile.classList.toggle("hidden", !gameState.hardVisible);
      });
    }
    /* ▲▲▲ ここまで ▲▲▲ */

    function updateTimer() {
      const now = performance.now();
      const elapsed = (now - gameState.timerStart) / 1000;
      timeLabel.textContent = elapsed.toFixed(3);
    }

    function finishGame(isClear) {
      gameState.locked = true;

      if (gameState.timerId) {
        clearInterval(gameState.timerId);
        gameState.timerId = null;
      }

      if (isClear) {
        statusLabel.textContent = `クリア！ タイム：${timeLabel.textContent} 秒`;
      } else {
        statusLabel.textContent = "ゲームオーバー…";

        document.querySelectorAll("#bottom-row .tile").forEach(tile => {
          tile.classList.add("gameover-dim-red");
        });
      }

      restartBtn.style.display = "inline-block";
      restartBtn.classList.add("blinking");
    }

    startNormalBtn.addEventListener("click", () => startGame("normal"));
    startHardBtn.addEventListener("click", () => startGame("hard"));

    restartBtn.addEventListener("click", () => {
      restartBtn.style.display = "none";
      restartBtn.classList.remove("blinking");
      resetGame();
    });
  </script>
</body>
</html>
